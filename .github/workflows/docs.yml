name: Deploy Docs

# Disabled: requires GitHub Pages to be enabled in repo settings.
# To re-enable, turn on Pages (Settings > Pages > Source: GitHub Actions)
# and remove the early-exit step below.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pages not configured
        run: |
          echo "GitHub Pages is not enabled for this repo."
          echo "Enable it in Settings > Pages > Source: GitHub Actions, then restore the full build steps."
          exit 0
