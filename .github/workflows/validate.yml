name: Validate Submission

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: metaHackathon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio
      - name: Run reward and exploit tests
        run: PYTHONPATH=. pytest tests/envs/test_insurance_claim_reward_and_exploit.py -q --tb=short
      - name: Smoke-import all three tasks
        run: PYTHONPATH=. python ci/smoke_import.py

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: metaHackathon
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t insurance-claim-env:ci .
      - name: Print image size
        run: docker images insurance-claim-env:ci

  server-smoke:
    name: Server Smoke Test
    runs-on: ubuntu-latest
    needs: docker-build
    defaults:
      run:
        working-directory: metaHackathon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install requests
        run: pip install requests
      - name: Build and start server
        run: |
          docker build -t insurance-claim-env:ci .
          docker run -d --name env-server -p 7860:7860 insurance-claim-env:ci
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:7860/health > /dev/null && echo "Ready after ${i}s" && break
            sleep 1
          done
      - name: GET /health
        run: |
          curl -sf http://localhost:7860/health | python -m json.tool
          STATUS=$(curl -sf http://localhost:7860/health | python -c "import sys,json; print(json.load(sys.stdin)['status'])")
          test "$STATUS" = "healthy" && echo "health OK" || (echo "FAIL: $STATUS" && exit 1)
      - name: GET /tasks (must be exactly 3)
        run: |
          COUNT=$(curl -sf http://localhost:7860/tasks | python -c "import sys,json; print(len(json.load(sys.stdin)['tasks']))")
          test "$COUNT" = "3" && echo "tasks OK ($COUNT)" || (echo "FAIL: got $COUNT" && exit 1)
      - name: POST /reset with empty body (must return session_id)
        run: |
          curl -sf -X POST http://localhost:7860/reset -H "Content-Type: application/json" -d '{}' | python -m json.tool
          HAS=$(curl -sf -X POST http://localhost:7860/reset -H "Content-Type: application/json" -d '{}' | python -c "import sys,json; d=json.load(sys.stdin); print('yes' if 'session_id' in d else 'no')")
          test "$HAS" = "yes" && echo "session_id OK" || (echo "FAIL: no session_id" && exit 1)
      - name: GET /schema (action + observation + state)
        run: |
          KEYS=$(curl -sf http://localhost:7860/schema | python -c "import sys,json; d=json.load(sys.stdin); print(all(k in d for k in ['action','observation','state']))")
          test "$KEYS" = "True" && echo "schema OK" || (echo "FAIL" && exit 1)
      - name: Full clean_claim episode (reward >= 0.70)
        run: python ci/test_clean_claim_episode.py
      - name: Concurrent sessions are isolated
        run: python ci/test_concurrent_sessions.py
      - name: Container logs on failure
        if: failure()
        run: docker logs env-server
