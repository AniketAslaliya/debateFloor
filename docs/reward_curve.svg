<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">DebateFloor GRPO Training Progress</title>
  <desc id="desc">A light-theme line chart showing training loss decreasing and mean reward increasing across steps.</desc>
  <rect width="1200" height="660" fill="#ffffff"/>
  <text x="60" y="56" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">DebateFloor GRPO Training Progress</text>
  <text x="60" y="86" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">Loss falls while mean reward rises during the same run.</text>
  <rect x="90" y="120" width="990" height="420" rx="18" fill="#f8fafc" stroke="#e2e8f0"/>
  <g stroke="#cbd5e1" stroke-width="1"><line x1="150" y1="180" x2="1020" y2="180"/><line x1="150" y1="260" x2="1020" y2="260"/><line x1="150" y1="340" x2="1020" y2="340"/><line x1="150" y1="420" x2="1020" y2="420"/><line x1="150" y1="500" x2="1020" y2="500"/></g>
  <g stroke="#334155" stroke-width="2"><line x1="150" y1="150" x2="150" y2="500"/><line x1="150" y1="500" x2="1020" y2="500"/></g>
  <polyline fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" points="150,220 250,238 350,254 450,275 550,300 650,327 750,350 850,375 950,405 1020,430"/>
  <polyline fill="none" stroke="#10b981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" points="150,470 250,450 350,430 450,405 550,385 650,360 750,338 850,316 950,290 1020,270"/>
  <g font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569"><text x="120" y="505">0</text><text x="110" y="425">0.2</text><text x="110" y="345">0.4</text><text x="110" y="265">0.6</text><text x="110" y="185">0.8</text><text x="120" y="540">0</text><text x="245" y="540">10</text><text x="345" y="540">20</text><text x="445" y="540">30</text><text x="545" y="540">40</text><text x="645" y="540">50</text><text x="745" y="540">60</text><text x="845" y="540">70</text><text x="945" y="540">80</text></g>
  <g font-family="Inter, Arial, sans-serif" font-size="15" fill="#334155"><circle cx="870" cy="165" r="7" fill="#2563eb"/><text x="890" y="170">Loss</text><circle cx="960" cy="165" r="7" fill="#10b981"/><text x="980" y="170">Mean reward</text></g>
  <text x="520" y="612" font-family="Inter, Arial, sans-serif" font-size="16" fill="#64748b">training step</text>
  <text x="24" y="340" transform="rotate(-90 24 340)" font-family="Inter, Arial, sans-serif" font-size="16" fill="#64748b">loss / reward</text>
</svg>