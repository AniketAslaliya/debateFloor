spec_version: 1
name: insurance_claim_triage_fraud_env
type: space
runtime: fastapi
app: app.main:app
port: 7860
metadata:
  title: Insurance Claim Triage and Fraud Detection Environment
  description: >-
    A deterministic OpenEnv environment for insurance claim processing where
    agents validate claim evidence, detect fraud signals, estimate payout bands,
    and make final adjudication decisions.
  tags:
    - openenv
    - insurance
    - fraud-detection
    - triage
  tasks:
    - id: clean_claim
      difficulty: easy
      max_steps: 8
      objective: Validate a clean auto claim, estimate payout, approve correctly.
    - id: contradictory_claim
      difficulty: medium
      max_steps: 12
      objective: >-
        Detect contradictions (date mismatch, cost inflation, signature mismatch,
        prior similar claim) and deny/escalate with evidence.
        Use lookup_policy_history to discover the prior procedure claim.
    - id: coordinated_fraud
      difficulty: hard
      max_steps: 20
      objective: >-
        Query linked claims to discover cross-claim fraud patterns. After querying 2 claims,
        a 4th hidden claim surfaces (dynamic ring expansion). Flag all 5 signals including
        clustered_policy_broker discoverable from the 4th claim. Escalate the full cluster.
    - id: identity_fraud
      difficulty: hard
      max_steps: 15
      objective: >-
        Detect ghost claimant using verify_identity and document validation.
        Flag all 4 identity signals (identity_mismatch, hospital_no_record,
        recent_policy_purchase, dob_inconsistency) and deny or escalate.
        Use lookup_policy_history to surface the 5-day-old policy as a signal.
  action_space:
    - validate_document
    - request_information
    - lookup_policy_history
    - compare_documents
    - flag_fraud_signal
    - estimate_payout
    - approve_claim
    - deny_claim
    - request_investigation
    - query_linked_claim
    - verify_identity
  observation_space:
    - claim_id
    - task_id
    - claimant
    - incident
    - documents
    - linked_claims
    - action_history
    - available_actions
    - step_number
    - max_steps
    - flags_raised
    - status
    - message
    - reward_breakdown
